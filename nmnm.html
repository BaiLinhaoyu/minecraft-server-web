
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 2023级三班智能点名系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #4a90e2, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e1e8ff;
        }

        .student-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .student-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }

        .student-item.selected {
            background: linear-gradient(135deg, #ff7b7b, #ff5252);
            color: white;
            transform: scale(0.95);
        }

        .student-item.selected::after {
            content: '✓';
            position: absolute;
            top: 2px;
            right: 6px;
            font-size: 0.8rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 14px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a90e2, #5ca0f2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff7b7b, #ff5252);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 123, 123, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            color: white;
        }

        .result-section {
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff5252;
            margin: 15px 0;
            animation: bounce 0.6s ease;
            text-shadow: 0 2px 10px rgba(255, 82, 82, 0.3);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .status {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #56ab2f);
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4a90e2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .history {
            margin-top: 20px;
            max-height: 100px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .history-item {
            display: inline-block;
            background: #e3f2fd;
            padding: 4px 8px;
            margin: 3px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 20px;
            }
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }

        /* 滚动条美化 */
        .student-grid::-webkit-scrollbar {
            width: 8px;
        }
        .student-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .student-grid::-webkit-scrollbar-thumb {
            background: #4a90e2;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 2023级三班智能点名系统</h1>
        <p class="subtitle">让课堂互动变得更加有趣高效</p>

        <div class="student-grid" id="studentGrid">
            <!-- 学生名单将通过JS动态生成 -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="randomCall()">
                <span>🎯</span> 随机点名
            </button>
            <button class="btn btn-secondary" onclick="relayCall()">
                <span>🔄</span> 接龙模式
            </button>
            <button class="btn btn-success" onclick="resetAll()">
                <span>♻️</span> 重置系统
            </button>
        </div>

        <div class="result-section">
            <div class="status" id="status">准备就绪</div>
            <div class="result" id="result">点击按钮开始点名</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalStudents">46</div>
                    <div class="stat-label">总人数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="calledCount">0</div>
                    <div class="stat-label">已点名</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="remainingCount">46</div>
                    <div class="stat-label">未点名</div>
                </div>
            </div>

            <div class="history" id="history" style="display: none;">
                <strong>📋 点名历史：</strong>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        // 学生数据
        const studentData = [
            '白林浩宇', '蔡嘉博', '陈弘逸', '陈康睿', '陈瑞啸', '陈欣怡', '陈子馨',
            '方宏源', '范展睿', '黄子玮', '孔轩豪', '林俊伊', '李拉缇', '李文宇',
            '孙唯溪', '王宏睿', '王璟', '王珺一', '王苛静', '王湤淇', '王馨怡',
            '王奕翔', '王宥涵', '吴力烨', '项佳雯', '项经毅', '项洛勋', '谢佳璇',
            '杨子淇', '叶恩宇', '余星墨', '章涵亮', '张皓轩', '张铭轩', '张珉铭',
            '张启恒', '张荣轩', '张思瑶', '章寅轩', '张哲云', '周丞烨', '周梦洁',
            '周伊', '周子予', '朱颂扬', '朱振瑜'
        ];

        let selectedStudents = [];
        let callHistory = [];
        let isRunning = false;

        // 初始化学生网格
        function initializeStudents() {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';
            studentData.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'student-item';
                item.textContent = name;
                item.dataset.index = index;
                grid.appendChild(item);
            });
            updateStats();
        }

        // 更新统计信息
        function updateStats() {
            const total = studentData.length;
            const called = selectedStudents.length;
            const remaining = total - called;
            
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('calledCount').textContent = called;
            document.getElementById('remainingCount').textContent = remaining;
            
            // 更新进度条
            const progress = (called / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // 显示/隐藏历史记录
            const historyDiv = document.getElementById('history');
            historyDiv.style.display = callHistory.length > 0 ? 'block' : 'none';
        }

        // 更新学生网格显示状态
        function updateStudentGrid() {
            const items = document.querySelectorAll('.student-item');
            items.forEach(item => {
                if (selectedStudents.includes(item.textContent)) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        // 随机点名
        function randomCall() {
            if (isRunning) return;
            
            isRunning = true;
            const available = studentData.filter(s => !selectedStudents.includes(s));
            
            if (available.length === 0) {
                document.getElementById('result').textContent = '所有学生都已点过名了！';
                document.getElementById('status').textContent = '接龙模式完成';
                isRunning = false;
                return;
            }

            // 动画效果
            let count = 0;
            const animInterval = setInterval(() => {
                const random = studentData[Math.floor(Math.random() * studentData.length)];
                document.getElementById('result').textContent = random;
                count++;
                if (count > 15) {
                    clearInterval(animInterval);
                    const finalStudent = available[Math.floor(Math.random() * available.length)];
                    selectedStudents.push(finalStudent);
                    callHistory.push(finalStudent);
                    
                    document.getElementById('result').textContent = finalStudent;
                    document.getElementById('status').textContent = '随机点名结果';
                    
                    updateStats();
                    updateStudentGrid();
                    updateHistory();
                    isRunning = false;
                }
            }, 80);
        }

        // 接龙模式
        function relayCall() {
            if (isRunning) return;
            
            if (selectedStudents.length === studentData.length) {
                document.getElementById('result').textContent = '所有学生都已被抽选过！';
                document.getElementById('status').textContent = '接龙完成 🎉';
                return;
            }

            isRunning = true;
            const available = studentData.filter(s => !selectedStudents.includes(s));
            const randomStudent = available[Math.floor(Math.random() * available.length)];
            
            // 添加动画效果
            let count = 0;
            const animInterval = setInterval(() => {
                const temp = available[Math.floor(Math.random() * available.length)];
                document.getElementById('result').textContent = temp;
                count++;
                if (count > 10) {
                    clearInterval(animInterval);
                    selectedStudents.push(randomStudent);
                    callHistory.push(randomStudent);
                    
                    document.getElementById('result').textContent = randomStudent;
                    document.getElementById('status').textContent = `接龙点名 - 第 ${selectedStudents.length} 位`;
                    
                    updateStats();
                    updateStudentGrid();
                    updateHistory();
                    isRunning = false;
                }
            }, 100);
        }

        // 更新历史记录
        function updateHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = callHistory.map((name, index) => 
                `<span class="history-item">${index + 1}. ${name}</span>`
            ).join('');
        }

        // 重置系统
        function resetAll() {
            selectedStudents = [];
            callHistory = [];
            document.getElementById('result').textContent = '点击按钮开始点名';
            document.getElementById('status').textContent = '准备就绪';
            
            updateStats();
            updateStudentGrid();
            updateHistory();
            
            // 重置动画
            document.querySelector('.container').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.container').style.animation = 'slideIn 0.6s ease-out';
            }, 10);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') randomCall();
            if (e.key === '2') relayCall();
            if (e.key === 'r' || e.key === 'R') resetAll();
        });

        // 初始化
        initializeStudents();
    </script>
</body>
</html>
